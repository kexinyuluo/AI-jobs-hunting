# CI — the gate for the PUBLIC job-hunting toolkit repo.
#
# Steps 1-3 (vendored-copy drift check, compile, example render + validate) verify
# the toolkit itself and pass in ANY checkout (with or without the private overlay).
#
# Steps 4-6 run the unit tests: resume-writer schema/extraction/render/E2E, the
# shared-module suite (job metadata, the metadata editor, layout/search/backfill),
# and the publish leak-guard suite (structural PII detection, path denylist,
# fail-closed binaries, allowlist copy). These must pass everywhere.
#
# Step 7 is the public leak guard (scripts/publish/check_public.py) — a BLOCKING
# gate. This IS the public toolkit repo, so the guard must be completely clean
# (exit 0, zero findings) on every run; ANY finding is a regression. It is armed
# with the `JOBHUNT_PERSONAL_TOKENS` repo secret when present. Fork PRs do NOT
# receive repo secrets, so on a fork the guard runs tokenless (structural PII +
# path / private-skill checks only) — safe by design, because a clean public tree
# passes without any identity tokens.
#
# The `secret-scan` job (gitleaks) is an independent gate that catches credential
# shapes the identity guard does not target.

name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # The toolkit requires Python 3.11+; the requirements (pyyaml, python-docx,
      # pypdf) are tested on 3.12 here.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # LibreOffice powers the DOCX -> PDF conversion in render.py / cover_letter.py.
      # `libreoffice-writer` runs headless and is enough to convert the example
      # resume + cover-letter DOCX to PDF, while being much lighter than the full
      # suite. With it installed, the example render below runs WITHOUT --no-pdf, so
      # check.py's one-page PDF validation also runs. (If you ever need to drop the
      # LibreOffice install to speed CI up, add --no-pdf to the render step — that
      # skips PDF creation and check.py auto-skips the PDF page-count check.)
      - name: Install LibreOffice (DOCX -> PDF for the example render)
        run: sudo apt-get update && sudo apt-get install -y libreoffice-writer

      # 1. Vendored-copy drift check: every skill's scripts/_vendor/ copy must be
      #    byte-identical to its canonical scripts/shared/ source.
      - name: Vendored-copy drift check
        run: python scripts/vendoring/sync_vendored.py --check

      # 2. Compile everything so no toolkit or skill script has a syntax error.
      - name: Compile all Python
        run: python -m compileall scripts .agents/skills/*/scripts

      # 3. Render + validate the worked example using the fake "Jordan Rivers"
      #    config.example.yaml. render.py auto-runs check.py (locked fields, real
      #    titles/skills, bullet lengths, one-page PDF, cover-letter prose).
      - name: Example render + validate (fake "Jordan Rivers" config)
        run: |
          JOBHUNT_CONFIG="$PWD/config.example.yaml" \
            python .agents/skills/resume-writer/scripts/render.py \
            examples/applications/6_drafted/example-corp-senior-software-engineer/

      # 4. Resume-writer tests: canonical/legacy schema normalization,
      #    multi-employer extraction/render/layout, and one isolated
      #    `_test_application_` search-to-PDF workflow.
      - name: Resume-writer unit tests + multi-experience E2E
        run: >-
          JOBHUNT_CONFIG="$PWD/config.example.yaml"
          python -m unittest discover
          -s .agents/skills/resume-writer/scripts/tests

      # 5. Shared-module unit tests: job-metadata extraction/validation, the
      #    formatting-preserving metadata editor, company-levels import, layout
      #    helpers, and the search/backfill flows.
      - name: Shared-module unit tests
        run: python -m unittest discover scripts/shared/tests

      # 6. Job-search tests include the deterministic high-stakes filter corpus,
      #    snapshot/refilter parity, review preservation, and handoff contracts.
      - name: Job-search unit tests + filter variant corpus
        run: |
          JOBHUNT_CONFIG="$PWD/config.example.yaml" \
            python -m unittest discover \
            -s .agents/skills/job-search/scripts/tests \
            -t .agents/skills/job-search/scripts/tests
          python .agents/skills/job-search/scripts/validate_filter_variants.py --check

      # 7. Publish leak-guard + exporter UNIT TESTS (required gate). Exercises the
      #    guard's structural PII / path-denylist / fail-closed logic and the
      #    allowlist exporter end-to-end.
      - name: Leak-guard + exporter unit tests
        run: python -m unittest discover scripts/publish/tests

      # 8. Public leak guard — BLOCKING. This is the public toolkit repo, so the
      #    guard must be completely clean (exit 0, zero findings); ANY finding is a
      #    regression. Armed with the JOBHUNT_PERSONAL_TOKENS repo secret when
      #    present. Fork PRs receive no secrets, so those runs are tokenless
      #    (structural + path/private-skill checks only) by design — a clean public
      #    tree passes without identity tokens.
      - name: Public leak guard (blocking; must be clean on this public repo)
        env:
          JOBHUNT_PERSONAL_TOKENS: ${{ secrets.JOBHUNT_PERSONAL_TOKENS }}
        run: python scripts/publish/check_public.py

  # Independent secret-scanning gate: catches API-key / token / credential shapes
  # across the full history that the identity-token guard does not target.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
