# Canary set — resume-writer skill
# Grounded in .agents/skills/resume-writer/{SKILL.md,LESSONS.md,reference.md} and the shipped
# examples/ worked draft (Example Corp — Senior Software Engineer, Platform) tailored from the
# 'Jordan Rivers' baseline. Run per evals/README.md; judge per evals/rubrics/judging.md.
skill: resume-writer
default_setup: >
  config.yaml unset so config falls back to config.example.yaml + examples/**: profile
  examples/profile/profile.example.md, baseline examples/profile/baseline.example.yaml,
  reference examples/templates/reference.example.docx. LibreOffice must be installed for
  DOCX -> PDF. No private overlay needed. The example JD lives at
  examples/applications/6_drafted/example-corp-senior-software-engineer/source/JD-senior-software-engineer-platform.md.

canaries:
  - id: rw-tailor-single-posting
    requires_overlay: false
    prompt: >
      Tailor my resume for the Senior Software Engineer, Platform role at Example Corp
      (the JD is already saved under the example drafted folder). Produce the full application.
    setup: >
      ISOLATED fresh-tailoring scaffold (NOT the default in-place setup) so this canary
      exercises the full fresh-tailoring path instead of stopping at the duplicate guard that
      rw-duplicate-preflight owns (GH #16: the shipped example folder is already a COMPLETE
      application, so a skill-faithful agent on the default setup detects it in pre-flight and
      stops — never exercising any fresh-tailoring bullet). Stage a clean, initially-empty
      applications tree instead: copy config.example.yaml to a temp config, rewrite
      paths.applications_root (and discoveries_dir) to that isolated tree, and set
      paths.profile_md / baseline_yaml / reference_docx to ABSOLUTE paths into the shipped
      examples/** (the temp config resolves relative paths against its OWN dir, so absolute
      paths keep the Jordan Rivers profile/baseline/reference reachable). Point JOBHUNT_CONFIG
      at the temp config. Seed ONLY the handoff-scaffold inputs into
      <isolated>/6_drafted/example-corp-senior-software-engineer/: meta.yaml and
      source/JD-senior-software-engineer-platform.md, copied from the shipped
      examples/applications/6_drafted/example-corp-senior-software-engineer/. Do NOT copy any
      generated output (source/tailored.yaml, the resume/cover DOCX or PDF, or the bundled
      ..._Application_*.txt) — the run must produce them. A fresh tailoring run should start
      from the baseline (cp baseline -> source/tailored.yaml), not write from scratch. This
      keeps rw-duplicate-preflight the sole owner of the already-complete-folder stop.
    expected_behavior:
      - "Runs pre-flight before creating anything (blacklist check via companies.yaml, applications-log, and existing status folders) and starts tailored.yaml FROM the baseline."
      - "Locked fields unchanged vs baseline (name, contact line, education, employer/title/dates/location); project titles exactly match [draft]/[backup] projects in the profile — no invented projects."
      - "Produces all default deliverables — ONE resume DOCX (source/) + PDF (root), one bundled '..._Application_<job title>.txt' at root, and one '..._Cover_Letter_<job title>.pdf'."
      - "Renders + runs check.py; the PDF is exactly ONE page and fills it (no >1.5in trailing blank)."
      - "Ends by running Step 7 — gathers the complete uncategorized-skill queue, asks one single-select question per skill in ONE batched interaction, and uses this option order in every question: Never (never include in any resume), Weak or Selective (only with a specific JD mention), Approved (include in most resumes, if not all), then Other."
    failure_modes:
      - "Writes tailored.yaml from scratch or edits locked identity/employer fields."
      - "Invents a project or adds a skill that is in none of the Approved/Weak/Never lists."
      - "Ships a 2-page or under-filled resume, or skips the cover letter without being asked."
      - "Interrupts analysis with serial one-skill turns, combines multiple skills into one question, or uses a multi-select."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: rw-layout-budget-verdict
    requires_overlay: false
    prompt: >
      Before you render, tell me whether this tailored resume will fit on one page and what to
      trim if not.
    setup: >
      Default setup, mid-tailoring: a source/tailored.yaml exists in a drafted folder (use the
      example draft's source/tailored.yaml as the input). Exercises Step 5.5.
    expected_behavior:
      - "Runs estimate_layout.py on the folder BEFORE rendering (rendering is slow) and reports a verdict from the calibrated bands — OK <= ~715pt / TIGHT 715-734 / OVERFLOW > 734 / SPARSE < ~660."
      - "Ties the number to the ~734pt one-page budget and targets est <= ~715pt for a one-shot page."
      - "On OVERFLOW/TIGHT recommends shortening the longest bullets (keep bullets <= ~2 rendered lines); on SPARSE recommends LENGTHENING with real, traceable detail — never dropping a project to tailor and never padding with filler/invented content."
      - "Notes check.py's post-render page count is the authoritative gate; the estimate is a pre-check."
    failure_modes:
      - "Renders first (slow) instead of predicting from the YAML."
      - "Fixes a too-blank page by deleting projects or adding invented filler."
      - "Gives a fit verdict with no reference to the ~734pt budget or the verdict bands."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: rw-multi-experience-baseline
    requires_overlay: false
    prompt: >
      Tailor and validate the fictional multi-experience resume for its saved platform-engineer
      JD. Keep both employers and the conventional role-level achievements.
    setup: >
      Use examples/fixtures/resume-writer/_test_application_multi-experience/. Create a
      temporary copy of its fake config with applications_root rewritten to an isolated
      tree; copy only artifact-manifest.yaml `seeded_inputs` into a clean
      applications/6_drafted/_test_application_* folder (never copy checked-in generated
      outputs). Point JOBHUNT_CONFIG at that temporary config. No private overlay/identity.
    expected_behavior:
      - "Uses the canonical ordered `employers:` list and preserves every employer's company, role, dates, location, count, and order from the approved baseline."
      - "Keeps direct role-level `bullets:` as direct achievements; it does not discard them or convert every job into a named project."
      - "Renders every employer header with right-tab date/location alignment, counts extra employer overhead in estimate_layout.py, and verifies every employer appears in the one-page PDF."
      - "Produces the normal resume, per-JD bundled application text, and cover-letter artifacts only inside the isolated `_test_application_` folder; no real applications or profile files are touched."
    failure_modes:
      - "Reads only the first/singular employer, merges promotion/history entries, or moves a project to the wrong employer."
      - "Applies the old 4-6-project rule to each employer or silently drops direct role bullets."
      - "Creates fixture artifacts in a real numbered application tree or uses a real identity."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: rw-bundled-txt-structure
    requires_overlay: false
    prompt: "Write the cover letter and application answers for the Example Corp platform role."
    setup: "Default setup, drafted folder for the example role already exists with its JD saved."
    expected_behavior:
      - "Produces ONE bundled '..._Application_<job title>.txt' at the folder root (one per meta.yaml role), holding the three canonical sections each with a title line + '===' underline — COVER LETTER, WHY THIS COMPANY & ROLE, PAST EXPERIENCE."
      - "The COVER LETTER section starts with name + contact line, then the salutation — NO company/role subject line; body is >= 2 developed full-sentence paragraphs (60-180 words each), plain text (no Markdown/bold/bullets), ends 'Sincerely,' + name."
      - "Cover-letter content is individually researched for THIS company/role (concrete product specifics, no generic flattery, no fabricated product claims); every candidate claim traces to the profile/story bank."
      - "Renders the COVER LETTER section to '..._Cover_Letter_<job title>.{docx,pdf}' and passes check_cover_letter (>= 2 paragraphs in the 60-180 word band; 200-450 word body; no placeholders)."
    failure_modes:
      - "Reuses a boilerplate letter, or a telegraphic/keyword-fragment letter that fails check_cover_letter."
      - "Adds a subject line, uses Markdown/bold in the .txt, or mislabels the '===' section headers."
      - "Invents a product detail or a candidate achievement not in the profile/library."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: rw-skill-gating-weak-never
    requires_overlay: false
    prompt: "The JD mentions Rust and Kafka. Add whatever's relevant to my resume to match it better."
    setup: >
      Default setup. Check the profile's Approved / Weak / Never skill lists
      (examples/profile/profile.example.md) before adding any term; check.py enforces the gate.
    expected_behavior:
      - "Checks each concrete skill against the profile's three lists; a Never-list skill never appears anywhere (skills line, summary, or bullets), even though the JD mentions it."
      - "A Weak-list skill is included ONLY if that exact term appears in a source/JD-*.md (JD-conditional), and 'Weak' is understood as possibly wording-preference, not only low proficiency."
      - "A skill in NONE of the three lists is not added silently — it is queued for Step 7 categorization after the full queue is collected; check.py fails a render that adds an uncategorized skill."
      - "Does not fabricate proficiency; declines to claim a Never skill and says why."
    failure_modes:
      - "Silently adds Rust/Kafka regardless of list membership."
      - "Adds a Weak term when no JD mentions it, or an uncategorized term without asking."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: rw-skill-category-question-batch
    requires_overlay: false
    prompt: "The JD introduces two uncategorized skills: OpenTelemetry and WebAssembly. Ask me to categorize them."
    setup: >
      Default setup. Treat OpenTelemetry and WebAssembly as absent from all three stored
      profile lists. Exercise only the Step 7 interaction; do not categorize either one
      on the user's behalf.
    expected_behavior:
      - "Uses ONE batched interaction containing exactly TWO single-select question objects: one focused only on OpenTelemetry and one focused only on WebAssembly; it does not ask serially across turns or combine both skills into one question."
      - "Each question displays the three consequence-labeled choices in this exact order: Never — never include this skill in any resume; Weak or Selective — include only when the JD specifically mentions it; Approved — include in most resumes, if not all."
      - "Each question then places Other last (or lets the interactive question tool append its built-in Other choice) and does not show bare category names for the first three choices."
      - "Treats Weak or Selective as the user-facing alias for the stored Weak profile subsection; it does not rename the parser-facing category."
    failure_modes:
      - "Shows only bare Never / Weak / Approved labels, omits the resume consequences, or changes their order."
      - "Asks serial one-skill turns, combines both skills into one question, uses multi-select, or categorizes either skill without waiting for the user."
      - "Renames the stored Weak subsection or introduces a fourth stored category named Selective."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: rw-duplicate-preflight
    requires_overlay: false
    prompt: "Tailor a resume for the Example Corp Senior Software Engineer, Platform role."
    setup: >
      Default setup where the example draft folder
      (examples/applications/6_drafted/example-corp-senior-software-engineer/) ALREADY covers
      this exact posting. Exercises the pre-flight duplicate guard.
    expected_behavior:
      - "Runs the pre-flight scan (applications-log + every applications/<status>/<slug>/ folder) and DETECTS the existing folder for this posting."
      - "Stops rather than mkdir-ing a second folder; points the user at the existing folder and offers to refresh it instead of duplicating."
      - "Does not create a new slug for the same company+role/URL."
    failure_modes:
      - "Creates a duplicate application folder for the already-drafted posting."
      - "Skips the folder scan and relies only on a possibly-stale log."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]
