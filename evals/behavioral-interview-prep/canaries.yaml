# Canary set — behavioral-interview-prep skill
# Grounded in .agents/skills/behavioral-interview-prep/SKILL.md + QUESTION_BANK.md: project-based
# story-bank shape (one project per file; long chronological detail; each paragraph starts with a
# parenthesized '(Area - summary)' tag; Story Index + Chronological Story Detail + Answer
# Generation Notes), reusable answer core over 1/2/5-min scripts, Tell-me-about-yourself uses
# present->past->future (NOT STAR), one file per company principle, and never fabricate. Uses the
# fictional 'Jordan Rivers' example profile. Run per evals/README.md; judge per evals/rubrics/judging.md.
skill: behavioral-interview-prep
default_setup: >
  config.yaml unset -> config.example.yaml + examples/** fallback; the profile is
  examples/profile/profile.example.md (projects tagged [draft]/[backup] are the real material).
  Story/answer output lands under interviews/behavioral-{story,answer}-bank/ (scratch/git-ignored
  in a public checkout; the transcript is judged, not a commit). No network, no private overlay needed.

canaries:
  - id: bp-story-bank-file
    requires_overlay: false
    prompt: "Build a project story-bank file for one of my strongest projects from my profile."
    setup: "Default setup. Derives a project/workstream from the example profile."
    expected_behavior:
      - "Produces ONE file for ONE project/workstream (not one file per interview question), intentionally long and chronological."
      - "Uses the preferred structure — a Story Index (Themes / Best question fits / Strongest proof points / Known gaps to fill), a Chronological Story Detail section, and Answer Generation Notes."
      - "Every detail paragraph begins with a short parenthesized tag combining area + summary, e.g. '(Context - ...)', '(Decision - ...)', '(Setback - ...)', '(Result - ...)'."
      - "Uses only real material from the profile; marks unknowns as explicit 'Known gaps' rather than inventing metrics, conflict, ownership, or technologies; defaults to 'I' not 'we'."
    failure_modes:
      - "Collapses the story into one polished interview answer instead of verbose chronology."
      - "One-question-per-file instead of one-project-per-file; missing the parenthesized tags."
      - "Fabricates numbers or scope not present in the profile."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: bp-story-to-question-mapping
    requires_overlay: false
    prompt: >
      Take my payments/platform project and map it to the behavioral questions it can answer,
      then give me an answer for it.
    setup: "Default setup, single-story input drawn from the profile."
    expected_behavior:
      - "Maps the story to 2-4 question families (prefers versatile stories), with a Best-fit Questions list and a Recommended Angle explaining why it fits."
      - "Generates the reusable modules — Intro version (one summary), a Reusable STAR answer with Action as the largest part and result+learning, and OPTIONAL short/long technical deep dives."
      - "Prefers ONE reusable answer core (spoken shorter or longer) over separate 1/2/5-minute scripts."
      - "Keeps Situation/Task brief; ends with result plus a learning."
    failure_modes:
      - "Produces separate 1-min / 2-min / 5-min scripts instead of one reusable core."
      - "Setup-heavy answer with little Action, or no question-family mapping."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: bp-tell-me-about-yourself
    requires_overlay: false
    prompt: "Help me answer 'tell me about yourself' for software engineering interviews."
    setup: "Default setup. If persisted, this is the reserved 00 file."
    expected_behavior:
      - "Uses a present -> past -> future structure, NOT forced STAR."
      - "Keeps a project-summary intro, then a reusable high-level answer core, then optional short/long technical deep dives introduced as bridges ('If useful, I can go deeper...')."
      - "If saved to the answer bank, reserves the 00 filename and wraps sections in collapsible <details> blocks with the visible '#' title."
      - "Grounds every claim in the real profile; length fits spoken delivery."
    failure_modes:
      - "Forces STAR onto 'tell me about yourself'."
      - "Uses a non-00 filename, or fabricates experience not in the profile."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]

  - id: bp-company-principles
    requires_overlay: false
    prompt: "Prep me for Amazon's Leadership Principles behavioral round."
    setup: >
      Default setup. Company-specific culture/principle prep. (Amazon is named in the skill as a
      framing target — no live company research is done here.)
    expected_behavior:
      - "Creates exactly ONE short numbered file per principle/value (e.g. interviews/company-specific/amazon/behavioral/NN-principle-name.md), not one giant aggregate file — optimized for fast interview-time navigation."
      - "Each principle file is compact — a descriptive project-and-angle heading then STAR (Situation/Task/Action/Result), avoiding long deep dives / recruiter-analysis / full indexes."
      - "Maps real profile stories to the Amazon LP framing (ownership, customer impact, dive deep, delivery) WITHOUT changing the underlying facts."
    failure_modes:
      - "One combined file for all principles instead of one file each."
      - "Bloated principle files with deep dives/indexes; or tailoring that alters the facts."
    primary_metric: rubric_pass
    efficiency_metrics: [total_tokens, wall_clock_s, tool_calls]
