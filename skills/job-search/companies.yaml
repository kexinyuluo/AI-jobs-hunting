# Canonical company registry for the job-search skill — the single source of truth
# for company IDENTITY, poll config, and the blacklist.
#
# Each POLLED entry: name, ats (greenhouse | ashby | lever | smartrecruiters |
# workday | amazon | apple | meta), token (the board slug), and tags used by
# profiles to select subsets. Tokens verified reachable 2026-07-10. Re-check with:
#   .venv/bin/python skills/job-search/scripts/validate_companies.py
#
# The AI-native tag family — `ai-lab` (frontier/applied AI), `ai-infra` (AI/ML
# infrastructure & data platforms), and `ai-native` (AI-first products whose core
# IS AI but that also fit another category) — marks employers as AI-native /
# AI-transitioning. Profiles' `ai_company.company_tags` reads this family to boost
# (or, with --ai-native-only, hard-filter to) "infra role AT an AI-native company".
# `ai-adopter` is reserved for established companies with sourced evidence of an
# aggressive AI transition; candidate-specific dated evidence stays in the private catalog.
#
# Optional per-entry keys (read by scripts/registry.py):
#   aliases: [..]     extra match strings, only where identity drifts (the resolver
#                     already derives match keys from `name` + `token`, so most
#                     entries need none; add when a board name != aggregator name,
#                     e.g. Arize / "Arize AI").
#   blacklist: "..."  presence means NEVER consider this company; the string is the
#                     reason (for your own records). Applies everywhere (company
#                     boards AND aggregator hits), matched via name/aliases/token.
#   poll_batch: "..."  opt-in board cohort for large registry expansions. Batched
#                     rows are polled only with search_jobs.py --company-batches;
#                     ordinary profile runs keep the unbatched registry footprint.
#
# IDENTITY-ONLY rows carry name + aliases + blacklist and OMIT ats/token: companies
# we never poll but still want to exclude (e.g. aggregator-surfaced employers).
# validate_companies.py and the fetch pipeline skip any row without `ats`.
#
# NOTE: company boards are ONE source. For market-wide coverage the skill also
# queries keyword aggregators (Arbeitnow, Jobicy, RemoteOK, The Muse) and, when
# API keys are set, Adzuna / JSearch (LinkedIn+Indeed) — see SKILL.md + reference.md.
#
# To add a company: find its ATS board slug (the path segment in its careers URL,
# e.g. boards.greenhouse.io/<slug>, jobs.ashbyhq.com/<slug>, jobs.lever.co/<slug>),
# add an entry with tags, then run validate_companies.py. Tokens are often but not
# always the lowercased name (Glean=gleanwork, Scale AI=scaleai, Navan=tripactions).

