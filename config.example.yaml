candidate:
  name: "Jordan Rivers"
  contact_line: "City, ST • jordan.rivers@example.com • linkedin.com/in/jordanrivers"
  name_slug: "Jordan_Rivers"
  title_slug: "Software_Engineer"
paths:
  profile_md: "examples/profile/profile.example.md"
  baseline_yaml: "examples/profile/baseline.example.yaml"
  reference_docx: "examples/templates/reference.example.docx"
  company_levels_yaml: "examples/profile/company-levels.example.yaml"
  applications_root: "examples/applications"
  discoveries_dir: "examples/applications/1_discoveries"
  # The single calendar/todo file the application tracker maintains alongside
  # per-job progress (interview schedules, booking todos, reschedule history).
  # Defaults to <applications_root>/0_profile/calendar.md when omitted.
  calendar_md: "examples/applications/0_profile/calendar.md"
job_search:
  default_profile: "example"
generation:
  # Token-usage mode for search + application drafting.
  #   token_saving (default) — routine card-first path: capped render cycles,
  #     <=2 research fetches per cover letter, refilter-first search, no extra sweeps.
  #   full — opt-in for deep multi-source research and extra polish iterations.
  # Hard gates (blacklist/log preflight, location gate, schema validation,
  # check.py, no-fabrication, skill-list gating) are identical in both modes.
  mode: token_saving   # token_saving (default) | full
outlook_email:
  # Personal mailbox settings belong in git-ignored config.yaml. Register a
  # Microsoft public-client app for personal accounts; never add a client secret
  # or Mail.Send permission. OAuth tokens live in the OS keyring, not this file.
  account: ""
  client_id: ""
  tenant: "consumers"
  # Optional explicit company -> email-domain mapping for ``store-review``.
  # Keep real values in git-ignored config.yaml or this private mapping file;
  # shared ATS domains (for example greenhouse.io) are rejected automatically.
  # company_domains:
  #   Example Company: [example.com]
  # company_domains_path: "private/email-company-domains.yaml"
location_policy:
  # Preferred-metro tokens (fictional placeholders for the "City, ST" example persona).
  metro: [springfield, fairview, riverside, lakemont]
  allow_us_remote: true
  us_only: true
retention:
  # Memory/forgetting windows for the gardener (see AGENTS.md "Memory Map").
  # Config readers ignore unknown keys, so this block is optional and safe to omit.
  discovery_ttl_days: 30       # discoveries/market scans go stale in ~30d → move to archive/
  discovery_archive_days: 14   # raw scans soft-archived at 14d
  search_log_prune_days: 90    # company-search-log rows older than 90d worth re-searching → prune
  lesson_confirm_days: 180     # LESSONS entries not re-confirmed within 180d → gardener flags demotion
